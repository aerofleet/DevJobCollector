# src/main/resources/application.yml

spring:
  application:
    name: devjobcollector
    
  profiles:
    active: local
    
  jpa:
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[dialect]": org.hibernate.dialect.MySQLDialect
        
data-api:
  public-data:
    base-url: https://apis.data.go.kr/1051000/recruitment
    service-key: ${API_SERVICE_KEY}