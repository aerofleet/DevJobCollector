# src/main/resources/application.yml

spring:
  application:
    name: devjobcollector
    
  profiles:
    active: local
    
  jpa:
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[dialect]": org.hibernate.dialect.MySQLDialect
        "[session.events.log.LOG_QUERIES_SLOWER_THAN_MS]": 50

perf:
  log:
    request-threshold-ms: 80
    service-threshold-ms: 60
    repository-threshold-ms: 40

logging:
  level:
    "[kr.itsdev.devjobcollector.monitoring]": INFO
    "[org.hibernate.SQL_SLOW]": INFO
        
data-api:
  public-data:
    base-url: https://apis.data.go.kr/1051000/recruitment
    service-key: ${API_SERVICE_KEY}

# application.yml에 추가
server:
  compression:
    enabled: true