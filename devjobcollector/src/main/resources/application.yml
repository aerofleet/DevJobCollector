# src/main/resources/application.yml

spring:
  application:
    name: devjobcollector
    
  profiles:
    active: local
    
  jpa:
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[dialect]": org.hibernate.dialect.MySQLDialect
        "[session.events.log.LOG_QUERIES_SLOWER_THAN_MS]": 50
perf:
  log:
    request-threshold-ms: 80
    service-threshold-ms: 60
    repository-threshold-ms: 40

logging:
  level:
    "[kr.itsdev.devjobcollector.monitoring]": INFO
    "[org.hibernate.SQL_SLOW]": INFO
        
data-api:
  public-data:
    base-url: https://apis.data.go.kr/1051000/recruitment
    service-key: ${API_SERVICE_KEY}

server:
  compression:
    enabled: true

auth:
  common:
    frontend-success-uri: ${AUTH_FRONTEND_SUCCESS_URI:http://localhost:5173/oauth/callback}
    token-query-param: token
  token:
    issuer: ${AUTH_TOKEN_ISSUER:devjobcollector}
    secret: ${AUTH_TOKEN_SECRET:change-this-secret-at-least-32chars}
    expires-minutes: ${AUTH_TOKEN_EXPIRES_MINUTES:120}
  local-login:
    enabled: ${AUTH_LOCAL_LOGIN_ENABLED:true}
    users:
      - id: ${AUTH_LOCAL_USER_ID:1}
        username: ${AUTH_LOCAL_USERNAME:admin}
        email: ${AUTH_LOCAL_EMAIL:admin@example.com}
        password: ${AUTH_LOCAL_PASSWORD:admin1234}
        name: ${AUTH_LOCAL_NAME:Local Admin}
        role: ${AUTH_LOCAL_ROLE:USER}
