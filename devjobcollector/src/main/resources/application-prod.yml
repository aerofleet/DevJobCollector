spring:
  datasource:
    url: jdbc:mysql://10.0.0.187:3306/devjob?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: dbadmin
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[session.events.log.LOG_QUERIES_SLOWER_THAN_MS]": 80

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      
logging:
  level:
    "[kr.itsdev.devjobcollector]": INFO
    "[kr.itsdev.devjobcollector.monitoring]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.hibernate.SQL_SLOW]": INFO

perf:
  log:
    request-threshold-ms: 120
    service-threshold-ms: 80
    repository-threshold-ms: 50
    
server:
  port: 8080
