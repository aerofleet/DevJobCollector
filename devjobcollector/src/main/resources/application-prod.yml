# src/main/resources/application.prod.yml

spring:
  datasource:
    url: jdbc:mysql://${DB_SERVER_IP}:3306/devjob?serverTimezone=Asia/Seoul&useSSL=false
    username: itsdev
    password: ${DB_PASSWORD}  # 환경변수 사용 권장
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
      
logging:
  level:
    "[kr.itsdev.devjobcollector]": INFO
    "[org.hibernate.SQL]": WARN
    
server:
  port: 8080