name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "auth-common/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Boot Jar
        run: ./gradlew clean bootJar -x test

      - name: Prepare artifact
        run: |
          JAR_PATH=$(ls build/libs/*.jar | grep -v '\-plain\.jar$' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No boot jar found in build/libs"
            exit 1
          fi
          cp "$JAR_PATH" app.jar

      - name: Upload app.jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.jar"
          target: "/home/ubuntu"
          overwrite: true

      - name: Restart backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_SERVICE_KEY: ${{ secrets.API_SERVICE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,API_SERVICE_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -euo pipefail

            cat > /home/ubuntu/djc.env <<EOF
            DB_PASSWORD=${DB_PASSWORD}
            API_SERVICE_KEY=${API_SERVICE_KEY}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            EOF
            chmod 600 /home/ubuntu/djc.env

            pkill -f "java -jar /home/ubuntu/app.jar" || true
            sleep 2

            set -a
            source /home/ubuntu/djc.env
            set +a

            nohup java -jar /home/ubuntu/app.jar \
              --spring.profiles.active=prod \
              --spring.datasource.url="jdbc:mysql://10.0.0.187:3306/devjob?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true" \
              --spring.datasource.username="dbadmin" \
              --spring.datasource.password="${DB_PASSWORD}" \
              --data-api.public-data.service-key="${API_SERVICE_KEY}" \
              --spring.jpa.hibernate.ddl-auto=none \
              --spring.security.oauth2.client.registration.google.client-id="${GOOGLE_CLIENT_ID}" \
              --spring.security.oauth2.client.registration.google.client-secret="${GOOGLE_CLIENT_SECRET}" \
              --spring.security.oauth2.client.registration.github.client-id="dummy" \
              --spring.security.oauth2.client.registration.github.client-secret="dummy" \
              > /home/ubuntu/app.log 2>&1 < /dev/null &

            sleep 10
            curl -fsS http://127.0.0.1:8080/actuator/health
