name: Deploy to Oracle Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Make gradlew executable
        working-directory: ./devjobcollector
        run: chmod +x gradlew
      
      - name: Build with Gradle
        working-directory: ./devjobcollector
        run: ./gradlew clean build -x test --no-daemon
      
      - name: List JAR files
        working-directory: ./devjobcollector
        run: ls -lh build/libs/
      
      - name: Deploy to Oracle Cloud
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DB_SERVER_IP: ${{ secrets.DB_SERVER_IP }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_SERVICE_KEY: ${{ secrets.API_SERVICE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "=== Deploying JAR to $SERVER_IP ==="
          
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            devjobcollector/build/libs/devjobcollector-0.0.1-SNAPSHOT.jar \
            $SERVER_USER@$SERVER_IP:/home/ubuntu/app.jar
          
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            $SERVER_USER@$SERVER_IP << ENDSSH
            
            echo "=== Stopping existing application ==="
            pkill -f "java -jar" || true
            sleep 2
            
            echo "=== Starting application ==="
            export DB_SERVER_IP="$DB_SERVER_IP"
            export DB_PASSWORD="$DB_PASSWORD"
            export API_SERVICE_KEY="$API_SERVICE_KEY"
            
            # Java 버전 확인
            java -version
            
            # 애플리케이션 시작
            nohup java -jar /home/ubuntu/app.jar \
              --spring.profiles.active=prod \
              > /home/ubuntu/app.log 2>&1 &
            
            APP_PID=\$!
            echo "Started with PID: \$APP_PID"
            
            # 시작 대기
            echo "=== Waiting for application to start ==="
            sleep 10
            
            # 프로세스 확인
            if ps -p \$APP_PID > /dev/null; then
              echo "✅ Application is running (PID: \$APP_PID)"
              ps aux | grep "java -jar" | grep -v grep
            else
              echo "❌ Application failed to start"
              echo "=== Last 50 lines of log ==="
              tail -50 /home/ubuntu/app.log
              exit 1
            fi
            
            # 로그 마지막 부분 출력
            echo "=== Application log (last 20 lines) ==="
            tail -20 /home/ubuntu/app.log
          ENDSSH
      
      - name: Deployment completed
        run: echo "✅ Deployment completed!"
