name: Deploy to Oracle Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Make gradlew executable
        working-directory: ./devjobcollector
        run: chmod +x gradlew
      
      - name: Build with Gradle
        working-directory: ./devjobcollector
        run: ./gradlew clean build -x test --no-daemon
      
      - name: List JAR files
        working-directory: ./devjobcollector
        run: ls -lh build/libs/
      
      - name: Deploy to Oracle Cloud
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_SERVICE_KEY: ${{ secrets.API_SERVICE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "=== Deploying JAR ==="
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            devjobcollector/build/libs/devjobcollector-0.0.1-SNAPSHOT.jar \
            $SERVER_USER@$SERVER_IP:/home/ubuntu/app.jar
          
          echo "=== Starting Application ==="
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP \
            "DB_PASSWORD='$DB_PASSWORD' API_SERVICE_KEY='$API_SERVICE_KEY' bash -s" << 'ENDSSH'
          
          # 기존 프로세스 종료
          pkill -f "java -jar" || true
          sleep 2
          
          # 환경변수 확인
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          echo "API_SERVICE_KEY length: ${#API_SERVICE_KEY}"
          
          # 애플리케이션 시작
          nohup java -jar /home/ubuntu/app.jar \
            --spring.profiles.active=prod \
            --spring.datasource.url="jdbc:mysql://10.0.0.187:3306/devjob?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true" \
            --spring.datasource.username=dbadmin \
            --spring.datasource.password="${DB_PASSWORD}" \
            --data-api.public-data.service-key="${API_SERVICE_KEY}" \
            > /home/ubuntu/app.log 2>&1 &
          
          APP_PID=$!
          echo "Started with PID: $APP_PID"
          sleep 10
          
          if ps -p $APP_PID > /dev/null 2>&1; then
            echo "✅ Application is running (PID: $APP_PID)"
            ps aux | grep "java -jar" | grep -v grep
            echo ""
            echo "=== Last 30 lines of log ==="
            tail -30 /home/ubuntu/app.log
          else
            echo "❌ Application failed to start"
            echo "=== Last 100 lines of log ==="
            tail -100 /home/ubuntu/app.log
            exit 1
          fi
          ENDSSH
      
      - name: Deployment completed
        run: echo "✅ Deployment completed!"
